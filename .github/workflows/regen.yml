name: SDK Regenerate

# Fires when the API backend publishes a new *production* spec, and regenerates
# the Fern Go SDK from it. The Go twin of platform-python's regen.yml.
#
# Generation runs scripts/regen.sh -> `fern generate --local` (the fern-go-sdk
# generator in a Docker container on the runner). No Fern account / FERN_TOKEN;
# the only inputs are the committed OpenAPI spec (specs/production/openapi.json,
# pushed here by the monorepo's publish-sdk-spec job before it dispatches) and
# the generator version pinned in fern/apis/backend/generators.yml.
#
# fern-go-sdk's --local generation wipes non-generated files in its output dir,
# so regen.sh generates into a throwaway ./.gen and rsyncs the result up to the
# repo root, preserving hand-written paths (drivers/ — the Go MobileDriver,
# AXI-1253 — plus .github/, VERSION, the fern config, the spec).
#
# Merging a regen PR does NOT cut a release: the SDK owns its own SemVer in the
# VERSION file, bumped deliberately. tag-on-merge.yml turns a VERSION bump into a
# `vX.Y.Z` tag, which is all a Go module needs to be `go get`-able.
#
# Staging dispatches are intentionally ignored: staging may carry endpoints prod
# does not have yet, and a staging-driven SDK would hand consumers types for
# endpoints that 404 in production.

on:
  repository_dispatch:
    types: [go-openapi-spec-updated]
  # Manual trigger for eyeballing / forcing a regen.
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  regenerate:
    name: Regenerate production Go SDK (Fern)
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event.action == 'go-openapi-spec-updated' &&
       github.event.client_payload.environment == 'production')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node (Fern CLI)
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Fern CLI
        # The launcher resolves the CLI version pinned in fern/fern.config.json;
        # ubuntu-latest ships Docker for --local generation.
        run: npm install -g fern-api

      - name: Regenerate SDK
        run: ./scripts/regen.sh

      - name: Detect changes
        id: diff
        run: |
          # Ignore fern's own .fern/ CLI metadata churn (gitignored anyway).
          if git diff --quiet; then
            echo "Generated code unchanged; nothing to PR."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "Changes detected; opening PR."
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open regen PR
        if: steps.diff.outputs.changed == 'true'
        # Single reused branch (regen/backend) — successive dispatches update the
        # same PR rather than stacking duplicates. add-paths scopes the commit to
        # the generated SDK + spec; hand-written paths (drivers/, .github/,
        # VERSION, CONTRIBUTING.md) are never touched. The regen does NOT bump
        # VERSION.
        #
        # CONTRIBUTING.md is repo-owned (also rsync-excluded in scripts/regen.sh):
        # Fern's generated version documents .fernignore, which this generator
        # ignores in --local mode, so regenerating it re-introduces instructions
        # that get a contributor's code deleted. README.md stays generated — it is
        # mostly API reference that should track the spec.
        uses: peter-evans/create-pull-request@v6
        env:
          AXILIO_SHA: ${{ github.event.client_payload.axilio_sha || 'manual' }}
          AXILIO_REF: ${{ github.event.client_payload.axilio_ref || 'manual' }}
        with:
          branch: regen/backend
          base: main
          add-paths: |
            *.go
            **/*.go
            go.mod
            go.sum
            reference.md
            wiremock/**
            README.md
            specs/production/openapi.json
          title: "chore(sdk): regenerate Go client (Fern)"
          commit-message: |
            chore(sdk): regenerate Go client (Fern)

            Auto-generated by .github/workflows/regen.yml via `fern generate --local`.
            Source: axilio@${{ env.AXILIO_SHA }} (${{ env.AXILIO_REF }})
          body: |
            Auto-generated by the SDK regen pipeline from the backend spec, via
            `fern generate --local` (fern-go-sdk in Docker). The generated tree
            has been rsynced up to the module root.

            | | |
            |---|---|
            | Axilio source SHA | `${{ env.AXILIO_SHA }}` |
            | Axilio source ref | `${{ env.AXILIO_REF }}` |
            | Spec path | `specs/production/openapi.json` |
            | Generator | `fern-go-sdk` (see fern/apis/backend/generators.yml) |

            ## What changed

            The production OpenAPI spec moved since the last regen. Only the
            Fern-generated code changed; hand-written code (drivers/, preserved by
            scripts/regen.sh) did not.

            ## What still needs human attention

            - This PR does **not** bump the SDK version, so merging it alone does
              not tag a release. The change ships with the next version bump (edit
              `VERSION`). The SDK version is independent of the backend.
            - If this regen adds or removes a whole resource group (a new backend
              tag), sanity-check the `client.Client` resource passthroughs.
